<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>CCTV Kabupaten Kulon Progo (Server 2) – LIVE CCTV Yogyakarta</title>
  <link rel="icon" href="../favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
      content="Pantauan kamera CCTV publik wilayah Kabupaten Kulon Progo melalui server alternatif (cadangan)." />
  <link rel="canonical" href="https://xxgbrl.github.io/cctv-yogyakarta/kulonprogo2/" />

  
  
  
  

  <!-- HLS -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    /* =====================
       BASE STYLE
    ===================== */
    body {
      margin: 0;
      background: #0b0b0b;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    video {
      width: 100%;
      height: 100%;
    }

    /* =====================
       SIDEBAR
    ===================== */
    .sidebar {
      width: 360px;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      margin: 0;
      padding: 12px;
      background: #151515;
      text-align: center;
    }

    .sidebar-header {
      padding: 10px 14px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    .back-home {
      text-decoration: none;
      color: #aaa;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }

    .back-home:hover {
      color: #fff;
    }

    #camList {
      flex: 1;
      overflow-y: auto;
    }

    .cam-btn {
      padding: 10px 12px;
      border-bottom: 1px solid #1f1f1f;
      cursor: pointer;
    }

    .cam-btn:hover {
      background: #1f1f1f;
    }

    .cam-btn.active {
      background: #2a2a2a;
    }

    /* =====================
       SEARCH
    ===================== */
    #searchBox::placeholder {
      color: #777;
    }

    /* =====================
       PLAYER
    ===================== */
    .player {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .player-title {
      padding: 12px;
      background: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-body {
      flex: 1;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder {
      color: #777;
    }

    #closeBtn {
      background: #222;
      color: #fff;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
      display: none;
    }

    #closeBtn:hover {
      background: #c0392b;
    }

    /* =====================
       MOBILE MODE
    ===================== */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 100vh;
        border-right: none;
      }

      .player {
        position: fixed;
        inset: 0;
        background: black;
        z-index: 999;
        display: none;
      }

      .player.active {
        display: flex;
      }
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <a href="https://xxgbrl.github.io/cctv-yogyakarta/" class="back-home">← Kembali ke Beranda</a>
    </div>
    <h2>DAFTAR CCTV</h2>

    <!-- SEARCH -->
    <div style="padding:10px;border-bottom:1px solid #222;display:flex;gap:6px">
      <input
        id="searchBox"
        type="text"
        placeholder="🔍 Cari kamera..."
        style="
          flex:1;
          padding:8px 10px;
          border-radius:6px;
          border:1px solid #333;
          background:#0b0b0b;
          color:#fff;
          outline:none;
        "
      />
      <button
        id="clearSearch"
        title="Clear"
        style="
          padding:0 10px;
          border-radius:6px;
          border:1px solid #333;
          background:#151515;
          color:#fff;
          cursor:pointer;
          display:none;
        "
      >✖</button>
    </div>

    <div id="camList"></div>
  </div>

  <!-- PLAYER -->
  <div class="player">
    <div class="player-title">
      <span id="playerTitle">Pilih kamera</span>
      <button id="closeBtn" onclick="closePlayer()">✖</button>
    </div>
    <div class="player-body" id="playerBody">
      <div class="placeholder">📷 Klik nama kamera</div>
    </div>
  </div>

<script>
/* =============================
   RAW CCTV LINKS
============================= */
const rawLinks = `
https://cctv.jogjaprov.go.id/cctv-proxy/atcs/DemenGlagah_TC.stream/chunklist_w1072692820.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/atcs/Siluwok.stream/chunklist_w912951046.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/Terminal.stream/chunklist_w195059214.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/KarangnongkoSelatan.stream/chunklist_w1314661670.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/KarangnongkoTengah.stream/chunklist_w905278824.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/KarangnongkoBarat.stream/chunklist_w1040794999.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/Karangnongko.stream/chunklist_w2137231956.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/TetegKulon.stream/chunklist_w515706781.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/LabKes.stream/chunklist_w388947194.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/AirMancur.stream/chunklist_w1557855720.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/AlunAlunUtara1.stream/chunklist_w1137805667.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/Kodim.stream/chunklist_w621980433.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/PojokTamanBermain.stream/chunklist_w188418312.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/PojokTamanBermain2.stream/chunklist_w55811038.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/LapanganBasket.stream/chunklist_w1230831035.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/HalamanMediaCenter.stream/chunklist_w428918020.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/HalamanPemda.stream/chunklist_w1931567289.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/TamanPemda.stream/chunklist_w1204072552.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/Watulunyu.stream/chunklist_w1783224924.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/WanaWil.stream/chunklist_w673035979.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/atcs/Ngeplang.stream/chunklist_w385725316.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/RBRA.stream/chunklist_w1801134701.m3u8
https://cctv.jogjaprov.go.id/cctv-proxy/cctv-kp/TetegWetan.stream/chunklist_w1972367703.m3u8
`;

/* =============================
   PARSE & FORMAT CAMERA LIST
============================= */
const cameras = rawLinks
  .split("\n")
  .map(l => l.trim())
  .filter(Boolean)
  .map(url => {
    const parts = url.split("/");
    const rawName = parts[parts.length - 2];

    const name = rawName
      .replace(".stream", "")
      .replace(/([a-z])([A-Z])/g, "$1 $2")
      .replace(/(\D)(\d+)/g, "$1 $2")
      .trim();

    return { name, url };
  })
  .sort((a, b) => a.name.localeCompare(b.name));

/* =============================
   ELEMENT REFERENCES
============================= */
const camList     = document.getElementById("camList");
const playerBody  = document.getElementById("playerBody");
const playerTitle = document.getElementById("playerTitle");
const searchBox   = document.getElementById("searchBox");
const clearBtn    = document.getElementById("clearSearch");

let hls = null;
let activeBtn = null;
let currentCameraId = 0;

/* =============================
   PLAYER CONTROLS
============================= */
function stopPlayer() {
  if (hls) {
    hls.destroy();
    hls = null;
  }
  playerBody.innerHTML = '<div class="placeholder">📷 Klik nama kamera</div>';
}

function playCamera(cam, btn) {
  const cameraId = ++currentCameraId;

  if (activeBtn) activeBtn.classList.remove("active");
  btn.classList.add("active");
  activeBtn = btn;

  stopPlayer();
  playerTitle.textContent = cam.name;
  document.querySelector(".player").classList.add("active");
  document.getElementById("closeBtn").style.display = "inline-block";

  const video = document.createElement("video");
  video.autoplay = true;
  video.muted = true;
  video.controls = true;
  video.playsInline = true;

  playerBody.innerHTML = "";
  playerBody.appendChild(video);

  if (Hls.isSupported()) {
    hls = new Hls({ lowLatencyMode: true, maxBufferLength: 10 });
    hls.loadSource(cam.url);
    hls.attachMedia(video);

    hls.on(Hls.Events.ERROR, (e, d) => {
      if (cameraId !== currentCameraId) return;
      if (!d.fatal) return;

      if (d.type === Hls.ErrorTypes.MEDIA_ERROR) {
        hls.recoverMediaError();
      } else {
        setTimeout(() => {
          if (cameraId === currentCameraId) playCamera(cam, btn);
        }, 3000);
      }
    });
  } else {
    video.src = cam.url;
  }
}

function closePlayer() {
  currentCameraId++;

  if (hls) {
    hls.destroy();
    hls = null;
  }

  if (activeBtn) {
    activeBtn.classList.remove("active");
    activeBtn = null;
  }

  playerTitle.textContent = "Pilih kamera";
  document.getElementById("closeBtn").style.display = "none";
  document.querySelector(".player").classList.remove("active");

  playerBody.innerHTML =
    '<div class="placeholder">📷 Klik nama kamera di kiri</div>';
}

/* =============================
   RENDER LIST
============================= */
function renderCameraList(list) {
  camList.innerHTML = "";
  list.forEach(cam => {
    const btn = document.createElement("div");
    btn.className = "cam-btn";
    btn.textContent = cam.name;
    btn.onclick = () => playCamera(cam, btn);
    camList.appendChild(btn);
  });
}

renderCameraList(cameras);

/* =============================
   SEARCH HANDLER
============================= */
searchBox.addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  clearBtn.style.display = q ? "block" : "none";

  renderCameraList(
    cameras.filter(cam => cam.name.toLowerCase().includes(q))
  );
});

clearBtn.addEventListener("click", () => {
  searchBox.value = "";
  clearBtn.style.display = "none";
  renderCameraList(cameras);
  searchBox.focus();
});
</script>

</body>
</html>
