  .map(l => l.trim())
  .filter(Boolean)
  .map(url => {
    const parts = url.split("/");
    const rawName = parts[parts.length - 2];

    const name = rawName
      .replace(".stream", "")
      .replace(/([a-z])([A-Z])/g, "$1 $2")
      .replace(/(\D)(\d+)/g, "$1 $2")
      .trim();

    return { name, url };
  })
  .sort((a, b) => a.name.localeCompare(b.name));

   PLAYER CONTROLS
============================= */
function stopPlayer() {
  if (hls) {
    hls.destroy();
    hls = null;
  }
  playerBody.innerHTML = '<div class="placeholder">📷 Klik nama kamera</div>';
}

function playCamera(cam, btn) {
  const cameraId = ++currentCameraId;

  if (activeBtn) activeBtn.classList.remove("active");
  btn.classList.add("active");
  activeBtn = btn;

  stopPlayer();
  playerTitle.textContent = cam.name;
  document.querySelector(".player").classList.add("active");
  document.getElementById("closeBtn").style.display = "inline-block";

  const video = document.createElement("video");
  video.autoplay = true;
  video.muted = true;
  video.controls = true;
  video.playsInline = true;

  playerBody.innerHTML = "";
  playerBody.appendChild(video);

  if (Hls.isSupported()) {
    hls = new Hls({ lowLatencyMode: true, maxBufferLength: 10 });
    hls.loadSource(cam.url);
    hls.attachMedia(video);

    hls.on(Hls.Events.ERROR, (e, d) => {
      if (cameraId !== currentCameraId) return;
      if (!d.fatal) return;

      if (d.type === Hls.ErrorTypes.MEDIA_ERROR) {
        hls.recoverMediaError();
      } else {
        setTimeout(() => {
          if (cameraId === currentCameraId) playCamera(cam, btn);
        }, 3000);
      }
    });
  } else {
    video.src = cam.url;
  }
}

function closePlayer() {
  currentCameraId++;

  if (hls) {
    hls.destroy();
    hls = null;
  }

  if (activeBtn) {
    activeBtn.classList.remove("active");
    activeBtn = null;
  }

  playerTitle.textContent = "Pilih kamera";
  document.getElementById("closeBtn").style.display = "none";
  document.querySelector(".player").classList.remove("active");

  playerBody.innerHTML =
    '<div class="placeholder">📷 Klik nama kamera di kiri</div>';
}

/* =============================
   RENDER LIST
============================= */
function renderCameraList(list) {
  camList.innerHTML = "";
  list.forEach(cam => {
    const btn = document.createElement("div");
    btn.className = "cam-btn";
    btn.textContent = cam.name;
    btn.onclick = () => playCamera(cam, btn);
    camList.appendChild(btn);
  });
}

renderCameraList(cameras);

/* =============================
   SEARCH HANDLER
============================= */
searchBox.addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  clearBtn.style.display = q ? "block" : "none";

  renderCameraList(
    cameras.filter(cam => cam.name.toLowerCase().includes(q))
  );
});

clearBtn.addEventListener("click", () => {
  searchBox.value = "";
  clearBtn.style.display = "none";
  renderCameraList(cameras);
  searchBox.focus();
});
</script>
