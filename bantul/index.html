    /* Status dot */

      transition: background 0.3s;

    /* =====================
       SEARCH
    ===================== */

    /* =====================
       PLAYER
    ===================== */

    ===================== */

        height: 100vh;
        border-right: none;
      }

      .player {
        position: fixed;
        inset: 0;
        background: black;
        z-index: 999;
        display: none;
      }

/* =============================
   SORT A-Z
============================= */
cameras.sort((a, b) =>
  a.name.toLowerCase().localeCompare(b.name.toLowerCase())
);

/* =============================
   ELEMENT REFERENCES
============================= */
const camList     = document.getElementById("camList");
const playerBody  = document.getElementById("playerBody");
const playerTitle = document.getElementById("playerTitle");
const searchBox   = document.getElementById("searchBox");
const clearBtn    = document.getElementById("clearSearch");

let hls = null;
let activeBtn = null;
let currentCameraId = 0;

// Map url -> dot element (untuk update status)
const dotMap = {};

/* =============================
   STATUS CHECK
============================= */
async function checkStatus(cam) {
  try {
    const res = await fetch(cam.url, { method: "HEAD", cache: "no-store" });
    return res.ok;
  } catch {
    return false;
  }
}

async function checkAllStatuses() {
  // Cek semua kamera secara paralel
  await Promise.all(cameras.map(async cam => {
    const online = await checkStatus(cam);
    const dot = dotMap[cam.url];
    if (dot) {
      dot.classList.remove("online", "offline");
      dot.classList.add(online ? "online" : "offline");
      dot.title = online ? "Kamera aktif" : "Kamera tidak aktif";
    }
  }));
}

/* =============================
   PLAYER CONTROLS
============================= */
function stopPlayer() {
  if (hls) {
    hls.destroy();
    hls = null;
  }
  playerBody.innerHTML = '<div class="placeholder">📷 Klik nama kamera</div>';
}

function playCamera(cam, btn) {
  const cameraId = ++currentCameraId;

  if (activeBtn) activeBtn.classList.remove("active");
  btn.classList.add("active");
  activeBtn = btn;

  stopPlayer();
  playerTitle.textContent = cam.name;
  document.querySelector(".player").classList.add("active");
  document.getElementById("closeBtn").style.display = "inline-block";

  const video = document.createElement("video");
  video.autoplay = true;
  video.muted = true;
  video.controls = true;
  video.playsInline = true;

  playerBody.innerHTML = "";
  playerBody.appendChild(video);

  if (Hls.isSupported()) {
    hls = new Hls({ lowLatencyMode: true, maxBufferLength: 10 });
    hls.loadSource(cam.url);
    hls.attachMedia(video);

    hls.on(Hls.Events.ERROR, (e, d) => {
      if (cameraId !== currentCameraId) return;
      if (!d.fatal) return;

      if (d.type === Hls.ErrorTypes.MEDIA_ERROR) {
        hls.recoverMediaError();
      } else {
        setTimeout(() => {
          if (cameraId === currentCameraId) playCamera(cam, btn);
        }, 3000);
      }
    });
  } else {
    video.src = cam.url;
  }
}

function closePlayer() {
  currentCameraId++;

  if (hls) {
    hls.destroy();
    hls = null;
  }

  if (activeBtn) {
    activeBtn.classList.remove("active");
    activeBtn = null;
  }

  playerTitle.textContent = "Pilih kamera";
  document.getElementById("closeBtn").style.display = "none";
  document.querySelector(".player").classList.remove("active");

  playerBody.innerHTML =
    '<div class="placeholder">📷 Klik nama kamera di kiri</div>';
}

/* =============================
   RENDER LIST
============================= */
function renderCameraList(list) {
  camList.innerHTML = "";
  list.forEach(cam => {
    const btn = document.createElement("div");
    btn.className = "cam-btn";

    const nameSpan = document.createElement("span");
    nameSpan.className = "cam-name";
    nameSpan.textContent = cam.name;

    const dot = document.createElement("span");
    dot.className = "status-dot";
    dot.title = "Mengecek...";

    // Simpan referensi dot berdasarkan URL
    dotMap[cam.url] = dot;

    btn.appendChild(nameSpan);
    btn.appendChild(dot);
    btn.onclick = () => playCamera(cam, btn);
    camList.appendChild(btn);
  });
}

renderCameraList(cameras);

// Cek status setelah list dirender
checkAllStatuses();

// Refresh status setiap 2 menit
setInterval(checkAllStatuses, 2 * 60 * 1000);

/* =============================
   SEARCH HANDLER
============================= */
searchBox.addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  clearBtn.style.display = q ? "block" : "none";

  renderCameraList(
    cameras.filter(cam => cam.name.toLowerCase().includes(q))
  );
});

clearBtn.addEventListener("click", () => {
  searchBox.value = "";
  clearBtn.style.display = "none";
  renderCameraList(cameras);
  searchBox.focus();
});

  (function () {
    var NAMESPACE   = "cctv-jogja-xxgbrl";
    var KEY         = "total-hits";
    var API         = "https://countapi.mileshilliard.com/api/v1";
    var SESSION_KEY = "vc_visited";

    if (!sessionStorage.getItem(SESSION_KEY)) {
      sessionStorage.setItem(SESSION_KEY, "1");
      fetch(API + "/hit/" + NAMESPACE + "_" + KEY);
    }
  })();
</script>
