    body {
      margin: 0;

      height: 100vh;
    }

    video { width: 100%; height: 100%; }

    .sidebar {
      width: 360px;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      margin: 0;
      padding: 12px;
      background: #151515;
      text-align: center;
    }

    .sidebar-header {
      padding: 10px 14px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    .back-home {
      text-decoration: none;
      color: #aaa;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }

    .back-home:hover { color: #fff; }

    #camList { flex: 1; overflow-y: auto; }

    .cam-btn {
      padding: 10px 12px;
      border-bottom: 1px solid #1f1f1f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .cam-btn:hover  { background: #1f1f1f; }
    .cam-btn.active { background: #2a2a2a; }

    .cam-name { flex: 1; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #444;
      transition: background 0.3s;
    }

    .status-dot.online  { background: #2ecc71; }
    .status-dot.offline { background: #e74c3c; }

    #searchBox::placeholder { color: #777; }

    .player {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .player-title {
      padding: 12px;
      background: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-body {
      flex: 1;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder { color: #777; }

    #closeBtn {
      background: #222;
      color: #fff;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
      display: none;
    }

    #closeBtn:hover { background: #c0392b; }

    @media (max-width: 768px) {
      body { flex-direction: column; }

      .sidebar {
        width: 100%;
        height: 100vh;
        border-right: none;
      }

      .player {
        position: fixed;
        inset: 0;
        background: black;
        z-index: 999;
        display: none;
      }

      .player.active { display: flex; }
    }
  </style>
</head>

const cameras = rawLinks
  .split("\n")
  .map(l => l.trim())
  .filter(Boolean)
  .map(url => {
    const parts = url.split("/");
    const folder = parts[parts.length - 2];
    const name = folder
      .replace(".stream", "")
      .replace(/_/g, " ")
      .replace(/\s+/g, " ")
      .trim();
    return { name, url };
  })
  .sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));

const camList     = document.getElementById("camList");
const playerBody  = document.getElementById("playerBody");
const playerTitle = document.getElementById("playerTitle");
const searchBox   = document.getElementById("searchBox");
const clearBtn    = document.getElementById("clearSearch");

let hls = null;
let activeBtn = null;
let currentCameraId = 0;
const dotMap = {};

async function checkStatus(cam) {
  try {
    const res = await fetch(cam.url, { method: "HEAD", cache: "no-store" });
    return res.ok;
  } catch {
    return false;
  }
}

async function checkAllStatuses() {
  await Promise.all(cameras.map(async cam => {
    const online = await checkStatus(cam);
    const dot = dotMap[cam.url];
    if (dot) {
      dot.classList.remove("online", "offline");
      dot.classList.add(online ? "online" : "offline");
      dot.title = online ? "Kamera aktif" : "Kamera tidak aktif";
    }
  }));
}

function stopPlayer() {
  if (hls) { hls.destroy(); hls = null; }
  playerBody.innerHTML = '<div class="placeholder">📷 Klik nama kamera</div>';
}

function playCamera(cam, btn) {
  const cameraId = ++currentCameraId;
  if (activeBtn) activeBtn.classList.remove("active");
  btn.classList.add("active");
  activeBtn = btn;
  stopPlayer();
  playerTitle.textContent = cam.name;
  document.querySelector(".player").classList.add("active");
  document.getElementById("closeBtn").style.display = "inline-block";

  const video = document.createElement("video");
  video.autoplay = true;
  video.muted = true;
  video.controls = true;
  video.playsInline = true;
  playerBody.innerHTML = "";
  playerBody.appendChild(video);

  if (Hls.isSupported()) {
    hls = new Hls({ lowLatencyMode: true, maxBufferLength: 10 });
    hls.loadSource(cam.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.ERROR, (e, d) => {
      if (cameraId !== currentCameraId) return;
      if (!d.fatal) return;
      if (d.type === Hls.ErrorTypes.MEDIA_ERROR) {
        hls.recoverMediaError();
      } else {
        setTimeout(() => { if (cameraId === currentCameraId) playCamera(cam, btn); }, 3000);
      }
    });
  } else {
    video.src = cam.url;
  }
}

function closePlayer() {
  currentCameraId++;
  if (hls) { hls.destroy(); hls = null; }
  if (activeBtn) { activeBtn.classList.remove("active"); activeBtn = null; }
  playerTitle.textContent = "Pilih kamera";
  document.getElementById("closeBtn").style.display = "none";
  document.querySelector(".player").classList.remove("active");
  playerBody.innerHTML = '<div class="placeholder">📷 Klik nama kamera di kiri</div>';
}

function renderCameraList(list) {
  camList.innerHTML = "";
  list.forEach(cam => {
    const btn = document.createElement("div");
    btn.className = "cam-btn";

    const nameSpan = document.createElement("span");
    nameSpan.className = "cam-name";
    nameSpan.textContent = cam.name;

    const dot = document.createElement("span");
    dot.className = "status-dot";
    dot.title = "Mengecek...";
    dotMap[cam.url] = dot;

    btn.appendChild(nameSpan);
    btn.appendChild(dot);
    btn.onclick = () => playCamera(cam, btn);
    camList.appendChild(btn);
  });
}

renderCameraList(cameras);
checkAllStatuses();
setInterval(checkAllStatuses, 2 * 60 * 1000);

searchBox.addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  clearBtn.style.display = q ? "block" : "none";
  renderCameraList(cameras.filter(cam => cam.name.toLowerCase().includes(q)));
});

clearBtn.addEventListener("click", () => {
  searchBox.value = "";
  clearBtn.style.display = "none";
  renderCameraList(cameras);
  searchBox.focus();
});
</script>
