<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>CCTV Kabupaten Sleman – LIVE CCTV Yogyakarta</title>
  <link rel="icon" href="../favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
      content="Pantauan kamera CCTV publik wilayah Kabupaten Sleman secara real-time dari berbagai titik jalan, fasilitas umum, dan area publik." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://xxgbrl.github.io/cctv-yogyakarta/sleman/" />

  <!-- HLS -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    video { width: 100%; height: 100%; }

    .sidebar {
      width: 360px;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      margin: 0;
      padding: 12px;
      background: #151515;
      text-align: center;
    }

    .sidebar-header {
      padding: 10px 14px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    .back-home {
      text-decoration: none;
      color: #aaa;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }

    .back-home:hover { color: #fff; }

    #camList { flex: 1; overflow-y: auto; }

    .cam-btn {
      padding: 10px 12px;
      border-bottom: 1px solid #1f1f1f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .cam-btn:hover  { background: #1f1f1f; }
    .cam-btn.active { background: #2a2a2a; }

    .cam-name { flex: 1; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #444;
      transition: background 0.3s;
    }

    .status-dot.online  { background: #2ecc71; }
    .status-dot.offline { background: #e74c3c; }

    #searchBox::placeholder { color: #777; }

    .player {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .player-title {
      padding: 12px;
      background: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-body {
      flex: 1;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder { color: #777; }

    #closeBtn {
      background: #222;
      color: #fff;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
      display: none;
    }

    #closeBtn:hover { background: #c0392b; }

    @media (max-width: 768px) {
      body { flex-direction: column; }

      .sidebar {
        width: 100%;
        height: 100vh;
        border-right: none;
      }

      .player {
        position: fixed;
        inset: 0;
        background: black;
        z-index: 999;
        display: none;
      }

      .player.active { display: flex; }
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <a href="https://xxgbrl.github.io/cctv-yogyakarta/" class="back-home">⇐ Kembali ke Beranda</a>
    </div>
    <h2>DAFTAR CCTV</h2>

    <div style="padding:10px;border-bottom:1px solid #222;display:flex;gap:6px">
      <input
        id="searchBox"
        type="text"
        placeholder="🔍 Cari kamera..."
        style="flex:1;padding:8px 10px;border-radius:6px;border:1px solid #333;background:#0b0b0b;color:#fff;outline:none;"
      />
      <button
        id="clearSearch"
        title="Clear"
        style="padding:0 10px;border-radius:6px;border:1px solid #333;background:#151515;color:#fff;cursor:pointer;display:none;"
      >✖</button>
    </div>

    <div id="camList"></div>
  </div>

  <div class="player">
    <div class="player-title">
      <span id="playerTitle">Pilih kamera</span>
      <button id="closeBtn" onclick="closePlayer()">✖</button>
    </div>
    <div class="player-body" id="playerBody">
      <div class="placeholder">📷 Klik nama kamera</div>
    </div>
  </div>

<script>
const cameras = [
  { name: "Perempatan Godean Arah Selatan", url: "https://ant.slemankab.go.id/CCTVLUARPEMDA/streams/524559704910938140590513.m3u8" },
  { name: "Pertigaan UIN", url: "https://ant.slemankab.go.id/CCTVLUARPEMDA/streams/032278190806133512572736.m3u8" },
  { name: "Amplaz Arah Timur", url: "https://ant.slemankab.go.id/CCTVLUARPEMDA/streams/624286194033618649155563.m3u8" },
  { name: "Pospol Jombor", url: "https://ant.slemankab.go.id/CCTVLUARPEMDA/streams/245993371803374753849150.m3u8" },
  { name: "Pelemgurih 1", url: "https://ant.slemankab.go.id/CCTVLUARPEMDA/streams/710715987663948483731029.m3u8" },
  { name: "Pertigaan Maguwo 1", url: "https://ant.slemankab.go.id/CCTVLUARPEMDA/streams/206298812007526786499421.m3u8" },
  { name: "Jembatan Krasak Arah Magelang", url: "https://ant.slemankab.go.id/CCTVLUARPEMDA/streams/964709525328892941170893.m3u8" },
  { name: "Prambanan Arah Klaten 1", url: "https://ant.slemankab.go.id/CCTVLUARPEMDA/streams/294652610113860954611144.m3u8" },
  { name: "Jembatan Krasak Arah Jogja", url: "https://ant.slemankab.go.id/CCTVLUARPEMDA/streams/162174530279439010500716.m3u8" },
];

cameras.sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));

const camList     = document.getElementById("camList");
const playerBody  = document.getElementById("playerBody");
const playerTitle = document.getElementById("playerTitle");
const searchBox   = document.getElementById("searchBox");
const clearBtn    = document.getElementById("clearSearch");

let hls = null;
let activeBtn = null;
let currentCameraId = 0;
const dotMap = {};

async function checkStatus(cam) {
  try {
    const res = await fetch(cam.url, { method: "HEAD", cache: "no-store" });
    return res.ok;
  } catch {
    return false;
  }
}

async function checkAllStatuses() {
  await Promise.all(cameras.map(async cam => {
    const online = await checkStatus(cam);
    const dot = dotMap[cam.url];
    if (dot) {
      dot.classList.remove("online", "offline");
      dot.classList.add(online ? "online" : "offline");
      dot.title = online ? "Kamera aktif" : "Kamera tidak aktif";
    }
  }));
}

function stopPlayer() {
  if (hls) { hls.destroy(); hls = null; }
  playerBody.innerHTML = '<div class="placeholder">📷 Klik nama kamera</div>';
}

function playCamera(cam, btn) {
  const cameraId = ++currentCameraId;
  if (activeBtn) activeBtn.classList.remove("active");
  btn.classList.add("active");
  activeBtn = btn;
  stopPlayer();
  playerTitle.textContent = cam.name;
  document.querySelector(".player").classList.add("active");
  document.getElementById("closeBtn").style.display = "inline-block";

  const video = document.createElement("video");
  video.autoplay = true;
  video.muted = true;
  video.controls = true;
  video.playsInline = true;
  playerBody.innerHTML = "";
  playerBody.appendChild(video);

  if (Hls.isSupported()) {
    hls = new Hls({ lowLatencyMode: true, maxBufferLength: 10 });
    hls.loadSource(cam.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.ERROR, (e, d) => {
      if (cameraId !== currentCameraId) return;
      if (!d.fatal) return;
      if (d.type === Hls.ErrorTypes.MEDIA_ERROR) {
        hls.recoverMediaError();
      } else {
        setTimeout(() => { if (cameraId === currentCameraId) playCamera(cam, btn); }, 3000);
      }
    });
  } else {
    video.src = cam.url;
  }
}

function closePlayer() {
  currentCameraId++;
  if (hls) { hls.destroy(); hls = null; }
  if (activeBtn) { activeBtn.classList.remove("active"); activeBtn = null; }
  playerTitle.textContent = "Pilih kamera";
  document.getElementById("closeBtn").style.display = "none";
  document.querySelector(".player").classList.remove("active");
  playerBody.innerHTML = '<div class="placeholder">📷 Klik nama kamera di kiri</div>';
}

function renderCameraList(list) {
  camList.innerHTML = "";
  list.forEach(cam => {
    const btn = document.createElement("div");
    btn.className = "cam-btn";

    const nameSpan = document.createElement("span");
    nameSpan.className = "cam-name";
    nameSpan.textContent = cam.name;

    const dot = document.createElement("span");
    dot.className = "status-dot";
    dot.title = "Mengecek...";
    dotMap[cam.url] = dot;

    btn.appendChild(nameSpan);
    btn.appendChild(dot);
    btn.onclick = () => playCamera(cam, btn);
    camList.appendChild(btn);
  });
}

renderCameraList(cameras);
checkAllStatuses();
setInterval(checkAllStatuses, 2 * 60 * 1000);

searchBox.addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  clearBtn.style.display = q ? "block" : "none";
  renderCameraList(cameras.filter(cam => cam.name.toLowerCase().includes(q)));
});

clearBtn.addEventListener("click", () => {
  searchBox.value = "";
  clearBtn.style.display = "none";
  renderCameraList(cameras);
  searchBox.focus();
});
</script>

</body>
</html>
